<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="flex">

<div class="w-64 h-screen bg-indigo-600 text-white p-6">

<h2 class="text-2xl font-bold mb-8">Student Panel</h2>

<ul class="space-y-4">

<li>
<a href="dashboard.html">🏠 Dashboard</a>
</li>

<li>
<a href="timetable.html">📅 Timetable</a>
</li>

<li>
<a href="tests.html">📝 Tests</a>
</li>

<li>
<button onclick="logout()">🚪 Logout</button>
</li>

</ul>

</div>

<div class="flex-1 p-10">

<h1 class="text-3xl font-bold mb-6">Dashboard</h1>

<div class="grid grid-cols-3 gap-6">

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-gray-500">Attendance Records</h3>

<p id="attendanceCount" class="text-3xl font-bold">0</p>

</div>

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-gray-500">Upcoming Tests</h3>

<p id="testCount" class="text-3xl font-bold">0</p>

</div>

<div class="bg-white p-6 rounded-xl shadow">

<h3 class="text-gray-500">Welcome</h3>

<p class="text-lg">Track your school progress</p>

</div>

</div>

</div>

</div>

<script>

function logout(){

localStorage.removeItem("studentLoggedIn")

window.location.href="index.html"

}

let attendance = JSON.parse(localStorage.getItem("attendance")) || []

document.getElementById("attendanceCount").textContent = attendance.length

let tests = JSON.parse(localStorage.getItem("tests")) || []

document.getElementById("testCount").textContent = tests.length

</script>

</body>

</html>
