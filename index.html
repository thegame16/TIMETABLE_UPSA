<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Planner Dashboard</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">
  <!-- Splash Page -->
<section id="splash" class="page active">
  <div class="splash-container">
    <h1>🎓 Student Planner</h1>
    <p class="splash-tagline">Powered by EdTech for Erica</p>
  </div>
</section>

  <!-- Sidebar -->
  <aside class="sidebar collapsed" id="sidebar">
    <h2>🎓 Planner</h2>
    <button onclick="showPage('dashboard')">🏠 Dashboard</button>
    <button onclick="showPage('timetable')">📅 Courses</button>
    <button onclick="showPage('attendance')">✅ Attendance</button>
    <button onclick="showPage('overview')">📊 Attendance Overview</button>
    <button onclick="showPage('study')">📚 Study</button>
  </aside>

  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <main class="content" id="content">
    <header>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h1>Lectra</h1>
    </header>

   <!-- Dashboard -->
<section id="dashboard" class="page active">
  <div class="card">
    <h2>Dashboard</h2>
    <div class="dashboard-cards">
      <div class="dash-card">Total Courses: <span id="dashCourses">0</span></div>
      <div class="dash-card">Total Classes Logged: <span id="dashClasses">0</span></div>
      <div class="dash-card">Total Study Hours: <span id="dashStudy">0</span></div>
    </div>
  </div>
</section>
    
    <!-- Courses -->
    <section id="timetable" class="page">
      <div class="card">
        <h2>Courses</h2>
        <div class="form">
          <input id="courseName" placeholder="Course Name">
          <select id="courseDay">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
          </select>
          <input type="time" id="courseTime">
          <button onclick="addCourse()">Add Course</button>
        </div>
        <div id="timetableGrid"></div>
      </div>
    </section>

    <!-- Attendance -->
    <section id="attendance" class="page">
      <div class="card">
        <h2>Log Attendance</h2>
        <div class="form">
          <select id="attendanceCourseSelect"></select>
          <input type="date" id="attendanceDate">
          <input type="time" id="attendanceTime">
          <button onclick="logAttendance()">Log Attendance</button>
        </div>
      </div>
    </section>

    <!-- Attendance Overview -->
    <section id="overview" class="page">
      <div class="card">
        <h2>Attendance Overview</h2>
        <table id="attendanceTable">
          <thead>
            <tr>
              <th>Course</th>
              <th>Date</th>
              <th>Time</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- Study -->
    <section id="study" class="page">
      <div class="card">
        <h2>Study Sessions</h2>
        <div class="form">
          <input id="studySubject" placeholder="Subject">
          <input type="number" id="studyHours" placeholder="Hours">
          <button onclick="logStudy()">Log Study</button>
        </div>
        <ul id="studyList"></ul>
      </div>
    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
