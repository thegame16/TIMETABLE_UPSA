<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Academic Planner</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar collapsed" id="sidebar">
    <h2>🎓 Planner</h2>
    <button onclick="showPage('timetable')">📅 Timetable</button>
    <button onclick="showPage('tests')">📝 Tests</button>
    <button onclick="showPage('study')">📚 Study</button>
    <button onclick="showPage('analytics')">📊 Analytics</button>
  </aside>

  <!-- OVERLAY -->
  <div class="overlay" id="overlay" onclick="toggleSidebar(); closeAttendanceModal()"></div>

  <!-- MAIN CONTENT -->
  <main class="content" id="content">

    <header>
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <h1>Student Academic Planner</h1>
    </header>

    <!-- TIMETABLE PAGE -->
    <section id="timetable" class="page active">
      <div class="card">
        <h2>Academic Timetable</h2>
        <div class="form">
          <input id="courseName" placeholder="Course Name">
          <select id="courseDay">
            <option>Monday</option>
            <option>Tuesday</option>
            <option>Wednesday</option>
            <option>Thursday</option>
            <option>Friday</option>
          </select>
          <input type="time" id="courseTime">
          <button onclick="addCourse()">Add Course</button>
        </div>
        <div id="timetableGrid"></div>
      </div>
    </section>

    <!-- ATTENDANCE MODAL -->
    <div class="modal" id="attendanceModal">
      <div class="modal-content">
        <span class="close" onclick="closeAttendanceModal()">&times;</span>
        <h3 id="modalCourseTitle"></h3>
        <div class="modal-form">
          <input type="date" id="attendanceDate">
          <button onclick="markAttendance('Present')">Mark Present</button>
          <button onclick="markAttendance('Absent')">Mark Absent</button>
        </div>
        <h4>Attendance History</h4>
        <ul id="attendanceHistory"></ul>
      </div>
    </div>

    <!-- TEST PAGE -->
    <section id="tests" class="page">
      <div class="card">
        <h2>Test Scheduler</h2>
        <div class="form">
          <input id="testTitle" placeholder="Test Name">
          <input type="date" id="testDate">
          <button onclick="addTest()">Add Test</button>
        </div>
        <ul id="testList"></ul>
      </div>
    </section>

    <!-- STUDY PAGE -->
    <section id="study" class="page">
      <div class="card">
        <h2>Study Sessions</h2>
        <div class="form">
          <input id="studySubject" placeholder="Subject">
          <input type="number" id="studyHours" placeholder="Hours">
          <button onclick="logStudy()">Log Study</button>
        </div>
        <ul id="studyList"></ul>
      </div>
    </section>

    <!-- ANALYTICS PAGE -->
    <section id="analytics" class="page">
      <div class="card">
        <h2>Academic Analytics</h2>
        <div class="charts">
          <canvas id="attendanceChart"></canvas>
          <canvas id="studyChart"></canvas>
        </div>
      </div>
    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
