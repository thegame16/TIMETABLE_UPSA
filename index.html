<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Timetable</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins', sans-serif;
}
</style>

</head>

<body class="bg-gradient-to-r from-indigo-500 to-purple-600 h-screen flex items-center justify-center">

<div class="bg-white p-10 rounded-2xl shadow-2xl w-96">

<h1 class="text-2xl font-semibold text-center mb-6">Student Login</h1>

<form id="loginForm" class="space-y-4">

<input
type="email"
id="email"
placeholder="Email"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400"
required
>

<input
type="password"
id="password"
placeholder="Password"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-400"
required
>

<button class="w-full bg-indigo-600 text-white p-3 rounded-lg hover:bg-indigo-700 transition">
Login
</button>

</form>

</div>

<script src="js/auth.js"></script>

</body>

</html>
